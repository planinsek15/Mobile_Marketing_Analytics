name: 'mma_dbt'
version: '1.0.0'
config-version: 2

profile: 'mma_dbt'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Mobile Marketing Analytics — medallion arhitektura:
#   staging (silver) → reconciliation + marts (gold)
models:
  mma_dbt:
    staging:
      +materialized: view
      +schema: staging
    reconciliation:
      +materialized: table
      +schema: marts
    marts:
      +materialized: table
      +schema: marts
